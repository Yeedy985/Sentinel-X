<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64">
      <stop stop-color="#0c1222"/>
      <stop offset="1" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="main" x1="16" y1="12" x2="48" y2="52">
      <stop stop-color="#06b6d4"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="pulse" x1="10" y1="36" x2="54" y2="36">
      <stop stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="glow" x1="32" y1="8" x2="32" y2="56">
      <stop stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>
  <!-- Shield outline -->
  <path d="M32 8 L50 18 L50 36 Q50 50 32 56 Q14 50 14 36 L14 18 Z"
        stroke="url(#main)" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Stylized 'A' letterform -->
  <path d="M32 14 L20 48 L25 48 L28 39 L36 39 L39 48 L44 48 Z M30 34 L32 22 L34 34 Z"
        fill="url(#main)" fill-rule="evenodd"/>
  <!-- Signal pulse line -->
  <path d="M10 36 L20 36 L24 28 L28 42 L32 24 L36 44 L40 30 L44 36 L54 36"
        stroke="url(#pulse)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Corner accent dots -->
  <circle cx="14" cy="18" r="1.5" fill="#06b6d4" opacity="0.6"/>
  <circle cx="50" cy="18" r="1.5" fill="#8b5cf6" opacity="0.6"/>
</svg>
